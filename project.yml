name: TravelOmikuji
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 11.0.0
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

targets:
  TravelOmikuji:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: TravelOmikuji
        excludes:
          - Info.plist
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.TravelOmikuji
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 83VGKGSQUH
        CODE_SIGN_STYLE: Automatic
    info:
      path: TravelOmikuji/Info.plist
      properties:
        CFBundleName: TravelOmikuji
        CFBundleDisplayName: 旅行先おみくじ
        CFBundleIconName: AppIcon
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        GADApplicationIdentifier: "ca-app-pub-9404799280370656~7157941495"
        NSUserTrackingUsageDescription: "パーソナライズ広告のためにデータを使用します"
